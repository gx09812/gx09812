<svg fill="none" viewBox="0 0 800 420" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 22px 'Segoe UI', Ubuntu, sans-serif; fill: #58a6ff; }
    .item-title { font: bold 15px 'Segoe UI', Ubuntu, sans-serif; fill: #c9d1d9; }
    .item-desc { font: 13px 'Segoe UI', Ubuntu, sans-serif; fill: #8b949e; }
    .node { fill: #1f6feb; stroke: #58a6ff; stroke-width: 2; }
    .line { stroke: #30363d; stroke-width: 2; stroke-dasharray: 4 4; }
    .bg { fill: #0d1117; rx: 10px; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6px; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <g transform="translate(30, 45)">
    <text class="title">🚀 What's Next / Tech Roadmap</text>
  </g>

  <line x1="60" y1="90" x2="60" y2="360" class="line" />

  <g transform="translate(30, 80)">
    <circle cx="30" cy="30" r="6" class="node" />
    <rect x="60" y="5" width="680" height="50" class="card" />
    <text x="75" y="26" class="item-title">🔗 Embedded IoT Dashboards</text>
    <text x="75" y="44" class="item-desc">Hands-on with ESP32/Arduino-class projects tied into cloud &amp; local dashboards.</text>
  </g>

  <g transform="translate(30, 150)">
    <circle cx="30" cy="30" r="6" class="node" />
    <rect x="60" y="5" width="680" height="50" class="card" />
    <text x="75" y="26" class="item-title">👁️ Computer Vision + Real Hardware</text>
    <text x="75" y="44" class="item-desc">Moving vision pipelines off webcams and directly onto dedicated edge hardware.</text>
  </g>

  <g transform="translate(30, 220)">
    <circle cx="30" cy="30" r="6" class="node" />
    <rect x="60" y="5" width="680" height="50" class="card" />
    <text x="75" y="26" class="item-title">⚡ FPGA &amp; VLSI Fundamentals</text>
    <text x="75" y="44" class="item-desc">Deepening knowledge in HDL, RTL synthesis, and core digital design work.</text>
  </g>

  <g transform="translate(30, 290)">
    <circle cx="30" cy="30" r="6" class="node" />
    <rect x="60" y="5" width="680" height="50" class="card" />
    <text x="75" y="26" class="item-title">🐧 Networking &amp; Embedded Linux</text>
    <text x="75" y="44" class="item-desc">Expanding localized firmware skills into full end-to-end distributed systems.</text>
  </g>
</svg>
