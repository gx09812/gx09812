<svg width="1500" height="430" viewBox="0 0 1500 430" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, Helvetica, sans-serif">

  <!-- ===================== LEFT PANEL: ABOUT ME ===================== -->

