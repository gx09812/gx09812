<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>

    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161f38" />
      <stop offset="100%" stop-color="#10172a" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="iotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="cvGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="100%" stop-color="#11998e" />
    </linearGradient>

    <linearGradient id="fpgaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>

    <linearGradient id="linuxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f12711" />
      <stop offset="100%" stop-color="#f5af19" />
    </linearGradient>
  </defs>

  <rect width="800" height="650" rx="16" fill="url(#bgGrad)" />
  
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550 M 0,600 L 800,600" />
    <path d="M 50,0 L 50,650 M 100,0 L 100,650 M 150,0 L 150,650 M 200,0 L 200,650 M 250,0 L 250,650 M 300,0 L 300,650 M 350,0 L 350,650 M 400,0 L 400,650 M 450,0 L 450,650 M 500,0 L 500,650 M 550,0 L 550,650 M 600,0 L 600,650 M 650,0 L 650,650 M 700,0 L 700,650 M 750,0 L 750,650" />
  </g>

  <g transform="translate(50, 60)">
    <path d="M 0,10 L 10,18 L 0,26" fill="none" stroke="#00f2fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="16" y1="26" x2="30" y2="26" stroke="#00f2fe" stroke-width="3" stroke-linecap="round" />
    <text x="45" y="24" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" letter-spacing="1">WHAT'S NEXT</text>
    <text x="45" y="45" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">Future roadmap &amp; engineering milestones</text>
  </g>

  <g transform="translate(50, 140)">
    <rect width="700" height="95" rx="12" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1" />
    <path d="M 0,12 C 0,5.37 5.37,0 12,0 L 16,0 L 16,95 L 12,95 C 5.37,95 0,89.63 0,83 Z" fill="url(#iotGrad)" />
    
    <g transform="translate(35, 30)" stroke="url(#iotGrad)" stroke-width="2" fill="none" stroke-linecap="round">
      <rect x="2" y="2" width="30" height="30" rx="4" stroke-width="2.5" />
      <line x1="11" y1="2" x2="11" y2="-3" />
      <line x1="23" y1="2" x2="23" y2="-3" />
      <line x1="11" y1="32" x2="11" y2="37" />
      <line x1="23" y1="32" x2="23" y2="37" />
      <line x1="2" y1="11" x2="-3" y2="11" />
      <line x1="2" y1="23" x2="-3" y2="23" />
      <line x1="32" y1="11" x2="37" y2="11" />
      <line x1="32" y1="23" x2="37" y2="23" />
      <circle cx="17" cy="17" r="4" fill="url(#iotGrad)" />
    </g>
    
    <text x="95" y="38" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Embedded IoT Systems</text>
    <text x="95" y="62" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Get hands-on with embedded boards (ESP32/Arduino-class) tied into IoT dashboards</text>
  </g>

  <g transform="translate(50, 255)">
    <rect width="700" height="95" rx="12" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1" />
    <path d="M 0,12 C 0,5.37 5.37,0 12,0 L 16,0 L 16,95 L 12,95 C 5.37,95 0,89.63 0,83 Z" fill="url(#cvGrad)" />
    
    <g transform="translate(35, 30)" stroke="url(#cvGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 2,10 L 2,4 C 2,2.9 2.9,2 4,2 L 10,2" />
      <path d="M 24,2 L 30,2 C 31.1,2 32,2.9 32,4 L 32,10" />
      <path d="M 2,24 L 2,30 C 2,31.1 2.9,32 4,32 L 10,32" />
      <path d="M 24,32 L 30,32 C 31.1,32 32,31.1 32,30 L 32,24" />
      <circle cx="17" cy="17" r="6" />
      <line x1="17" y1="7" x2="17" y2="11" />
      <line x1="17" y1="23" x2="17" y2="27" />
      <line x1="7" y1="17" x2="11" y2="17" />
      <line x1="23" y1="17" x2="27" y2="17" />
    </g>
    
    <text x="95" y="38" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Hardware-Accelerated Computer Vision</text>
    <text x="95" y="62" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Keep combining computer vision with real hardware instead of running it on webcams only</text>
  </g>

  <g transform="translate(50, 370)">
    <rect width="700" height="95" rx="12" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1" />
    <path d="M 0,12 C 0,5.37 5.37,0 12,0 L 16,0 L 16,95 L 12,95 C 5.37,95 0,89.63 0,83 Z" fill="url(#fpgaGrad)" />
    
    <g transform="translate(35, 30)" stroke="url(#fpgaGrad)" stroke-width="2" fill="none" stroke-linecap="round">
      <rect x="2" y="2" width="30" height="30" rx="3" />
      <circle cx="10" cy="10" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="17" cy="10" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="24" cy="10" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="10" cy="17" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="17" cy="17" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="24" cy="17" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="10" cy="24" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="17" cy="24" r="1.5" fill="url(#fpgaGrad)" />
      <circle cx="24" cy="24" r="1.5" fill="url(#fpgaGrad)" />
      <path d="M 10,12 L 10,15 L 15,17" stroke-width="1" opacity="0.7"/>
      <path d="M 17,19 L 17,22 L 22,24" stroke-width="1" opacity="0.7"/>
    </g>
    
    <text x="95" y="38" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">FPGA &amp; VLSI Fundamentals</text>
    <text x="95" y="62" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Deepen FPGA and VLSI fundamentals toward core digital design architecture work</text>
  </g>

  <g transform="translate(50, 485)">
    <rect width="700" height="95" rx="12" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1" />
    <path d="M 0,12 C 0,5.37 5.37,0 12,0 L 16,0 L 16,95 L 12,95 C 5.37,95 0,89.63 0,83 Z" fill="url(#linuxGrad)" />
    
    <g transform="translate(35, 30)" stroke="url(#linuxGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="17,2 32,11 32,29 17,38 2,29 2,11" stroke-width="1.5"/>
      <circle cx="17" cy="20" r="4" fill="url(#linuxGrad)"/>
      <line x1="17" y1="2" x2="17" y2="16" />
      <line x1="32" y1="29" x2="20" y2="22" />
      <line x1="2" y1="29" x2="14" y2="22" />
    </g>
    
    <text x="95" y="38" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Embedded Linux &amp; Networking</text>
    <text x="95" y="62" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Expand networking and embedded Linux projects into full end-to-end setups</text>
  </g>

  <g transform="translate(720, 600)" opacity="0.2" fill="none" stroke="#ffffff" stroke-width="1.5">
    <line x1="0" y1="10" x2="30" y2="10" />
    <line x1="20" y1="0" x2="30" y2="10" />
    <line x1="20" y1="20" x2="30" y2="10" />
    <circle cx="-10" cy="10" r="2" fill="#ffffff"/>
    <circle cx="-20" cy="10" r="2" fill="#ffffff"/>
  </g>
</svg>
